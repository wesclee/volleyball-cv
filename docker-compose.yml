version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - DATABASE_URL=sqlite:////app/data/volleyball_cv.db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
